 <!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" /> 
<head> 
<meta charset="utf-8"> 
<title>Liste des Laptops</title> 
</head> 
<body> 
<div th:replace="template"></div> 
<div class="container mt-5"> 
<div class="card"> 
  <div class="card-header"> 
    Liste des Laptops 
  </div> 
  <div class="card-body"> 
        
      <table class="table table-striped"> 
        <tr> 
          <th>ID</th><th>Nom Laptop</th><th>Prix</th> 
         </tr>   
           <tr th:each="l:${laptops.content}"> 
              <td th:text="${l.idLaptop}"></td> 
              <td th:text="${l.brandLaptop}"></td> 
              <td th:text="${l.prixLaptop}"></td>
			  <td><a class="btn btn-danger" onclick="return confirm('Etes-vous sûr ?')" th:href="@{supprimerLaptop(id=${l.idLaptop}, 
			  page=${currentPage},size=${size})}">Supprimer</a></td>     
           </tr>              
      </table> 
	  <ul class="nav nav-pills"> 
	  <li th:each="page,status:${pages}"> 
	  <a th:class="${status.index==currentPage?'btn btn-primary':'btn'  }"  
	  th:href="@{/listeLaptops(page=${status.index}, size=${size})}" 
	  th:text="${status.index }"></a> 
	  </li> 
	  </ul>
  </div> 
</div> 
</div> 
</body> 
</html>

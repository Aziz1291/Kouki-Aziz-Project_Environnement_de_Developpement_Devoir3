<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" type="text/css" href="/webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
<meta charset="utf-8">
<title>Créer un Laptop</title>
</head>
<body>
<div class="container mt-5">
  <div class="card">
    <div class="card-header">Ajouter un Laptop</div>
    <div class="card-body">
      <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
      <form th:action="@{/laptops/saveLaptop}" th:object="${Laptop}" method="post">
        <div class="mb-3">
          <label>Marque</label>
          <input type="text" class="form-control" th:field="*{brandLaptop}" />
        </div>
        <div class="mb-3">
          <label>Prix</label>
          <input type="number" step="0.01" class="form-control" th:field="*{prixLaptop}" />
        </div>
        <div class="mb-3">
          <label>Caractéristiques</label>
          <input type="text" class="form-control" th:field="*{caracteristiquesLaptop}" />
        </div>
        <div class="mb-3">
          <label>Date de création</label>
          <input type="date" class="form-control" name="date" />
        </div>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a th:href="@{/laptops/listeLaptops}" class="btn btn-secondary">Annuler</a>
      </form>
    </div>
  </div>
</div>
</body>
</html>

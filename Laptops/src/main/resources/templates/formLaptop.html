<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" > 
<link rel="stylesheet" type="text/css"href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" /> 
<head> 
<meta charset="utf-8"> 
<title>Ajout des Laptops</title> 
</head> 
<body> 
  <div th:replace="template"></div>  
   <div class="container mt-5"> 
   <div class="card"> 
	<div class="card-header" th:if="${mode=='new'}"> Ajout des Laptops </div> 
	<div class="card-header" th:if="${mode=='edit'}">Modification des Laptops </div> 
   <div class="card-body"> 
     <form th:action="@{saveLaptop}" method="post">
		<input  name="page" class="form-control" th:value="${page}"  /> 
		 <input  name="size" class="form-control" th:value="${size}"  /> 
       <div class="form-group"> 
    <label class="control-label" hidden>ID Laptop :</label>  
        <input type="hidden" name="idLaptop" class="form-control" 
th:value="${laptop.idLaptop}"  /> 
   </div>
       <div class="form-group"> 
    <label class="control-label">Brand Laptop :</label>  
    <input type="text" name="brandLaptop" class="form-control" th:value="${laptop.brandLaptop}" />
	<span th:errors= ${laptop.brandLaptop} class="text-danger"> </span> 
       </div>   
        <div class="form-group"> 
    <label class="control-label">Prix Laptop :</label>  
    <input type="text" name="prixLaptop" class="form-control" th:value="${laptop.prixLaptop}"/>
	<span th:errors= ${laptop.prixLaptop} class="text-danger"> </span> 
       </div>
       <div class="form-group"> 
    <label class="control-label">Caracteristiques Laptop :</label>  
    <input type="text" name="caracteristiquesLaptop" class="form-control" th:value="${laptop.caracteristiquesLaptop}"/>
	<span th:errors= ${laptop.caracteristiquesLaptop} class="text-danger"> </span> 
       </div>   
       <div class="form-group"> 
          <label class="control-label">date création :</label>  
    <input type="date" name="dateCreation" class="form-control" th:value="${laptop.dateCreation}"/>
	<span th:errors= ${laptop.dateCreation} class="text-danger"> </span> 
      </div>
	  <div class="form-group"> 
	    <label class="control-label">Model :</label>  
	    <select name="model" class="form-control" 
	    th:value="${laptop.model.idModel}"  
	    th:if="${!#strings.isEmpty(laptop.model)}" >  
	    <option th:each="c:${models}" th:if="${mode=='edit'}"  
	            th:value="${c.idModel}" th:text="${c.nomModel}" 
	       th:selected="${ c.idModel==laptop.model.idModel}"> 
	    </option>     
	     
	  </select>   <!-- s'il s'agit d'un ajout (mode==new) ou d'une modification d'un produit ayant une catégorie null --> 
	    <select name="model" class="form-control" 
	    th:if="${#strings.isEmpty(laptop.model)}"> 
	    <option th:each="c:${models}" th:value="${c.idModel}"  
	       th:text="${c.nomModel}"> 
	    </option> 
	    </select>  
	    </div>  
   <div> 
        <button type="submit" class="btn btn-primary">Valider</button> 
     </div>  
          </form> 
    </div> 
          </div> 
       </div> 
</body> 
</html>
